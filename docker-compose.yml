services:
  api:
    # Build the image from the Dockerfile in this project.
    build: .

    # Give the running container an easy-to-recognize name.
    container_name: task-api

    # Map localhost:8000 on your computer to port 8000 in the container.
    ports:
      - "8000:8000"

    # Restart automatically if the process crashes during local testing.
    restart: unless-stopped
