apiVersion: v1
kind: Service
metadata:
  name: task-api
  labels:
    app: task-api
    component: backend
spec:
  # ClusterIP exposes the API inside the Kubernetes cluster.
  type: ClusterIP
  selector:
    app: task-api
    component: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
