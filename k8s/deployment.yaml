apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-api
  labels:
    app: task-api
    component: backend
spec:
  # Run two copies of the API so Kubernetes can keep serving traffic
  # if one pod is restarted.
  replicas: 2
  selector:
    matchLabels:
      app: task-api
      component: backend
  template:
    metadata:
      labels:
        app: task-api
        component: backend
    spec:
      containers:
        - name: task-api
          image: task-api:latest
          # Helpful for local Kubernetes clusters where the image is built
          # on your machine and may not exist in a remote registry.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
