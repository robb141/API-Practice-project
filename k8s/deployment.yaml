apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-api
  labels:
    app: task-api
    component: backend
spec:
  # Run two copies of the API so Kubernetes can keep serving traffic
  # if one pod is restarted.
  replicas: 2
  selector:
    matchLabels:
      app: task-api
      component: backend
  template:
    metadata:
      labels:
        app: task-api
        component: backend
    spec:
      containers:
        - name: task-api
          image: task-api:latest
          ports:
            - containerPort: 8000
